<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion des retards etudiants</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="background-shape shape-1" aria-hidden="true"></div>
  <div class="background-shape shape-2" aria-hidden="true"></div>

  <header class="hero reveal">
    <p class="hero-kicker">Formation Med5 Sale</p>
    <h1>Gestion des retards des etudiants</h1>
    <p class="hero-subtitle">
      Regle de calcul: <strong>1 minute de retard = 1 Dirham</strong>
    </p>
  </header>

  <main class="layout">
    <section class="card reveal delay-1" aria-labelledby="student-title">
      <h2 id="student-title">Fiche etudiant</h2>
      <form id="student-form" class="grid-form">
        <label for="nom">Nom</label>
        <input id="nom" name="nom" type="text" required maxlength="40" placeholder="Ex: El Alaoui" />

        <label for="prenom">Prenom</label>
        <input id="prenom" name="prenom" type="text" required maxlength="40" placeholder="Ex: Yassine" />

        <button type="submit">Ajouter etudiant</button>
      </form>
      <p id="student-feedback" class="feedback" aria-live="polite"></p>
    </section>

    <section class="card reveal delay-2" aria-labelledby="retard-title">
      <h2 id="retard-title">Saisie des retards (minutes)</h2>
      <form id="retard-form" class="grid-form">
        <label for="student-select">Etudiant</label>
        <select id="student-select" required>
          <option value="">Selectionner un etudiant</option>
        </select>

        <label for="minutes">Retard (min)</label>
        <input id="minutes" type="number" min="1" step="1" required placeholder="Ex: 12" />

        <label for="retard-date">Date</label>
        <input id="retard-date" type="date" required />

        <label for="note">Note</label>
        <input id="note" type="text" maxlength="80" placeholder="Optionnel" />

        <button type="submit">Enregistrer retard</button>
      </form>
      <p id="retard-feedback" class="feedback" aria-live="polite"></p>
    </section>

    <section class="card reveal delay-3" aria-labelledby="dashboard-title">
      <h2 id="dashboard-title">Tableau de bord</h2>
      <div class="stats" id="stats"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Prenom</th>
              <th>Nb retards</th>
              <th>Total min</th>
              <th>Montant (DH)</th>
            </tr>
          </thead>
          <tbody id="student-summary-body"></tbody>
        </table>
      </div>

      <h3>Visualisation rapide</h3>
      <div id="bars" class="bars"></div>
    </section>

    <section class="card reveal delay-4" aria-labelledby="history-title">
      <h2 id="history-title">Historique des retards</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Etudiant</th>
              <th>Minutes</th>
              <th>Montant (DH)</th>
              <th>Note</th>
            </tr>
          </thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
